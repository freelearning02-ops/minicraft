<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Tam Funksional Random Dünya</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #chat { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="chat">Oyun başladı: Dünya random generasiya olundu.</div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. Zəmin
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshBasicMaterial({color: 0x228B22}));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 2. Obyekt funksiyaları (Köhnə mexanika)
        function createHouse(x, z) {
            const house = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshBasicMaterial({color: 0x8B4513}));
            house.position.set(x, 1, z);
            scene.add(house);
        }

        function createGolem(x, z) {
            const golem = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 1), new THREE.MeshBasicMaterial({color: 0xFFFFFF}));
            golem.position.set(x, 1.5, z);
            scene.add(golem);
        }

        function createChest(x, z) {
            const chest = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({color: 0xFFD700}));
            chest.position.set(x, 0.25, z);
            scene.add(chest);
        }

        // 3. RANDOM SPAWN MEXANİKASI
        function generateRandomWorld() {
            for(let i = 0; i < 15; i++) {
                let x = (Math.random() - 0.5) * 100;
                let z = (Math.random() - 0.5) * 100;
                
                // Hər döngüdə təsadüfi obyekt seç
                let rand = Math.random();
                if(rand < 0.5) createHouse(x, z);
                else if(rand < 0.8) createGolem(x, z);
                else createChest(x, z);
            }
        }

        generateRandomWorld();

        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
</html>
