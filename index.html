<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Survival Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }
        
        #chat { position: absolute; top: 20px; left: 20px; width: 340px; height: 140px; background: rgba(0,0,0,0.5); color: #a8ffb2; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 13px; overflow-y: hidden; pointer-events: none; }
        
        /* ❤️ 8 Ürək can paneli */
        #heart-container { position: absolute; top: 180px; left: 20px; display: flex; gap: 4px; pointer-events: none; z-index: 10; }
        .heart { font-size: 24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        /* İnventar Ekranı (E düyməsi) */
        #inventory-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; background: rgba(40, 40, 40, 0.95); border: 3px solid #555; border-radius: 10px; color: white; padding: 20px; box-shadow: 0 0 25px rgba(0,0,0,0.8); z-index: 20; }
        .inv-title { text-align: center; margin-top: 0; color: #f1c40f; font-size: 18px; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .inv-item { background: #1e1e1e; border: 2px solid #444; padding: 10px; text-align: center; border-radius: 6px; cursor: pointer; }
        .inv-item:hover { border-color: #f1c40f; background: #2a2a2a; }
        .inv-item .icon { font-size: 24px; display: block; }
        .inv-item .count { font-size: 11px; color: #aaa; }
        
        /* Hotbar */
        #hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(20, 20, 20, 0.85); padding: 6px; border-radius: 8px; border: 2px solid #555; box-shadow: 0 8px 20px rgba(0,0,0,0.7); pointer-events: none; }
        .slot { width: 55px; height: 55px; margin: 0 4px; border: 3px solid #3a3a3a; background: #222; border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 10px; font-weight: bold; position: relative; }
        .slot.active { border-color: #f1c40f; background: #333; box-shadow: 0 0 12px #f1c40f; }
        .slot .key-num { position: absolute; top: 2px; left: 4px; color: #888; font-size: 9px; }
        .slot .icon { font-size: 22px; }

        #armor-status { position: absolute; bottom: 85px; left: 20px; background: rgba(0,0,0,0.6); color: white; padding: 10px; border-radius: 6px; font-size: 13px; pointer-events: none; }
        #instructions { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; pointer-events: none; text-align: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="chat"><div>[Sistem] Zombilərdən qorunun! Sandıqları tapıb qılıncı götürün!</div></div>
    
    <div id="heart-container"></div>
    
    <div id="armor-status">🛡️ Zireh: Yoxdur</div>

    <div id="inventory-screen">
        <h3 class="inv-title">🎒 Çantası</h3>
        <div class="inv-grid" id="inv-grid-element"></div>
        <p style="text-align:center; margin-bottom:0;"><button onclick="toggleInventory()" style="background:#e74c3c; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Bağla (E)</button></p>
    </div>
    
    <div id="hotbar">
        <div class="slot active" id="slot-1"><span class="key-num">1</span><span class="icon">🧱</span><span>Daş</span></div>
        <div class="slot" id="slot-2"><span class="key-num">2</span><span class="icon">🪵</span><span>Taxta</span></div>
        <div class="slot" id="slot-3"><span class="key-num">3</span><span class="icon">🟥</span><span>Kərpic</span></div>
        <div class="slot" id="slot-4"><span class="key-num">4</span><span class="icon">🥊</span><span>Əl</span></div>
    </div>

    <div id="instructions">
        <strong>WASD</strong>: Hərəkət | <strong>SPACE</strong>: Tullanmaq | <strong>E</strong>: İnventar | <strong>C</strong>: Kamera Dəyiş | <strong>Sol Klik</strong>: Qır/Zombiyə Vur
    </div>

    <div id="canvas-container"></div>

    <script>
        // 1. SƏHNƏ AYARLARI
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5c93c4); // Bir az tünd göy üzü (Təhlükəli hava)
        scene.fog = new THREE.FogExp2(0x5c93c4, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(20, 50, 10);
        scene.add(sunLight);

        // 2. OYUNÇU STATLARI (8 Can = 8 Ürək)
        let player = {
            height: 1.8, speed: 7, yVelocity: 0, gravity: -13.0, jumpForce: 5.5, canJump: true,
            position: new THREE.Vector3(0, 0, 12),
            inventory: { sword: 0, apple: 0, armor: 0 },
            isArmorEquipped: false,
            maxHealth: 8, health: 8,
            hasSwordInHand: false
        };

        let cameraMode = 0; // 0 = 1-ci şəxs, 1 = 3-cü şəxs
        let mobDamageCooldown = 0; // Mobların ard-arda sürətlə vurmasının qarşısını almaq üçün

        // Ürəkləri ekranda göstərmək üçün funksiya
        function updateHeartsUI() {
            const container = document.getElementById('heart-container');
            container.innerHTML = '';
            for(let i=0; i<player.maxHealth; i++) {
                let span = document.createElement('span');
                span.className = 'heart';
                span.innerText = i < player.health ? '❤️' : '🖤'; // Can gedəndə qara ürək olur
                container.appendChild(span);
            }
        }
        updateHeartsUI();

        // Xarakter modeli (3-cü şəxs üçün)
        const playerGroup = new THREE.Group();
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), new THREE.MeshLambertMaterial({ color: 0x3498db }));
        bodyMesh.position.y = 0.6; playerGroup.add(bodyMesh);
        const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshLambertMaterial({ color: 0xffdbac }));
        headMesh.position.y = 1.4; playerGroup.add(headMesh);
        
        // 3-cü şəxsdə görünən qılınc
        const tpSword = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.1), new THREE.MeshLambertMaterial({ color: 0x00ffff }));
        tpSword.position.set(0.4, 0.6, -0.3); tpSword.rotation.x = Math.PI / 4;
        tpSword.visible = false; playerGroup.add(tpSword);
        scene.add(playerGroup);

        // 1-ci şəxs (Ekranda əldə görünən) Almaz Qılınc
        const fpSwordGroup = new THREE.Group();
        const fpSwordMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.6, 0.08), new THREE.MeshLambertMaterial({ color: 0x00ffff }));
        fpSwordMesh.position.set(0.3, -0.3, -0.5); // Ekranın sağ aşağısına yerləşdiririk
        fpSwordMesh.rotation.set(Math.PI / 3, 0, -Math.PI / 6);
        fpSwordGroup.add(fpSwordMesh);
        camera.add(fpSwordGroup); // Qılıncı kameraya bağlayırıq ki, bizimlə hərəkət etsin
        scene.add(camera);
        fpSwordGroup.visible = false;

        // Zəmin
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({ color: 0x3b5921 }));
        ground.rotation.x = -Math.PI / 2; scene.add(ground);

        const collidableObjects = [];
        const chests = [];
        const mobs = []; // Zombilərin listi
        let activeBlockType = 1;

        function logToChat(text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div'); div.innerText = text; chat.appendChild(div);
            if(chat.children.length > 5) chat.removeChild(chat.children[0]);
        }

        // 3. EVLƏR VƏ SANDIQLARIN TİKİLMƏSİ
        function evYarat(xPos, zPos, color) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            for(let x=0; x<5; x++) {
                for(let y=0; y<4; y++) {
                    for(let z=0; z<5; z++) {
                        if((x===0 || x===4 || z===0 || z===4) || y===3) {
                            if(z === 4 && x === 2 && (y === 0 || y === 1)) continue; // Qapı
                            let b = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: y===3 ? 0x5a3d28 : color }));
                            b.position.set(xPos + x, y + 0.5, zPos + z); scene.add(b); collidableObjects.push(b);
                        }
                    }
                }
            }
            let chest = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0xd35400 }));
            chest.position.set(xPos + 2, 0.5, zPos + 2); chest.isChest = true; chest.opened = false;
            scene.add(chest); chests.push(chest); collidableObjects.push(chest);
        }
        evYarat(-6, -6, 0x7f8c8d);
        evYarat(4, -8, 0xd2b48c);

        // 4. 👾 MOBLARIN (ZOMBİLƏRİN) YARADILMASI
        function zombieYarat(x, z) {
            const zombieGroup = new THREE.Group();
            // Zombi bədəni (Yaşıl-göy rəngdə)
            const zBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), new THREE.MeshLambertMaterial({ color: 0x27ae60 }));
            zBody.position.y = 0.6; zombieGroup.add(zBody);
            const zHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshLambertMaterial({ color: 0x1e824c }));
            zHead.position.y = 1.4; zombieGroup.add(zHead);
            
            zombieGroup.position.set(x, 0, z);
            zombieGroup.isAlive = true;
            zombieGroup.health = 3; // Zombilər 3 qılınc zərbəsinə ölür
            scene.add(zombieGroup);
            mobs.push(zombieGroup);
        }
        // Şəhərə 3 dənə zombi əlavə edirik
        zombieYarat(-2, -15);
        zombieYarat(6, -16);
        zombieYarat(0, -5);

        // 5. İDARI VƏ İNVENTAR
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0; let isInventoryOpen = false;

        document.body.addEventListener('click', () => { if(!isInventoryOpen) document.body.requestPointerLock(); });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && !isInventoryOpen) {
                yaw -= e.movementX * 0.0025; pitch -= e.movementY * 0.0025;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        function toggleInventory() {
            isInventoryOpen = !isInventoryOpen;
            const screen = document.getElementById('inventory-screen');
            if(isInventoryOpen) { document.exitPointerLock(); screen.style.display = 'block'; yenileInventoryUI(); }
            else { screen.style.display = 'none'; document.body.requestPointerLock(); }
        }

        function yenileInventoryUI() {
            const grid = document.getElementById('inv-grid-element'); grid.innerHTML = '';
            const items = [
                { id: 'sword', name: 'Almaz Qılınc', icon: '⚔️', count: player.inventory.sword },
                { id: 'apple', name: 'Sehrli Alma', icon: '🍎', count: player.inventory.apple },
                { id: 'armor', name: 'Almaz Zireh', icon: '👕', count: player.inventory.armor }
            ];
            items.forEach(item => {
                if(item.count > 0) {
                    let div = document.createElement('div'); div.className = 'inv-item';
                    div.innerHTML = `<span class="icon">${item.icon}</span><b>${item.name}</b><div class="count">Say: ${item.count}</div>`;
                    div.onclick = () => itemIstifadeEt(item.id); grid.appendChild(div);
                }
            });
            if(grid.innerHTML === '') grid.innerHTML = '<p style="grid-column:1/5; text-align:center; color:#888;">Çantanız boşdur.</p>';
        }

        function itemIstifadeEt(itemId) {
            if(itemId === 'apple') {
                if(player.health < player.maxHealth) {
                    player.inventory.apple--; player.health = Math.min(player.maxHealth, player.health + 2);
                    updateHeartsUI(); logToChat("🍎 Almanı yedin, 2 ürək canın bərpa olundu!");
                } else { logToChat("Canın onsuz da doludur!"); }
            } 
            else if(itemId === 'armor') {
                player.inventory.armor--; player.isArmorEquipped = true;
                bodyMesh.material.color.setHex(0x00ffff);
                document.getElementById('armor-status').innerText = "🛡️ Zireh: Almaz Köynək (Aktiv)";
                logToChat("👕 Zireh geyinildi! Artıq moblar sənə yarıbayarı az zərər vuracaq.");
            }
            else if(itemId === 'sword') {
                player.inventory.sword--; player.hasSwordInHand = true;
                tpSword.visible = true; // 3-cü şəxsdə qılınc
                fpSwordGroup.visible = true; // 1-ci şəxsdə (Ekranda) qılınc
                document.getElementById('slot-4').innerHTML = '<span class="key-num">4</span><span class="icon">⚔️</span><span>Qılınc</span>';
                activeBlockType = 4;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                document.getElementById('slot-4').classList.add('active');
                logToChat("⚔️ Almaz Qılınc ələ alındı! Zombiləri məhv edə bilərsən.");
            }
            yenileInventoryUI();
        }

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyE') { e.preventDefault(); toggleInventory(); }
            if(isInventoryOpen) return;

            if(e.code === 'KeyW') moveForward = true; if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true; if(e.code === 'KeyD') moveRight = true;
            if(e.code === 'Space' && player.canJump) { player.yVelocity = player.jumpForce; player.canJump = false; }
            
            // 🎥 C DÜYMƏSİ İLƏ KAMERA DƏYİŞMƏK
            if(e.code === 'KeyC') {
                cameraMode = (cameraMode + 1) % 2;
                logToChat(cameraMode === 1 ? "🎥 Xarici kameraya keçildi (C)." : "🎥 Göz kamerasından baxılır (C).");
            }

            if(e.key >= '1' && e.key <= '4') {
                activeBlockType = parseInt(e.key);
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                document.getElementById(`slot-${e.key}`).classList.add('active');
            }
        });

        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false; if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false; if(e.code === 'KeyD') moveRight = false;
        });

        // 6. SOL KLİK HÜCUMU VƏ HEYVAN/ZOMBİ VURMA
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body || isInventoryOpen) return;
            
            raycaster.setFromCamera(screenCenter, camera);

            if (e.button === 0) { // Sol Klik
                // Qılınc Sallama Animasiyası (Həm 1-ci, həm 3-cü şəxs üçün)
                if(activeBlockType === 4 && player.hasSwordInHand) {
                    fpSwordMesh.position.z = -0.3; fpSwordMesh.rotation.z = Math.PI / 4; // 1st person swing
                    tpSword.rotation.z = Math.PI / 3; // 3rd person swing
                    setTimeout(() => { 
                        fpSwordMesh.position.z = -0.5; fpSwordMesh.rotation.set(Math.PI / 3, 0, -Math.PI / 6);
                        tpSword.rotation.z = 0;
                    }, 120);
                }

                // Önümüzdə zombi varmı deyə yoxlayırıq
                const zombiVuruldumu = raycaster.intersectObjects(mobs.filter(m => m.isAlive), true);
                if(zombiVuruldumu.length > 0 && zombiVuruldumu[0].distance < 4.5) {
                    let hitZombie = zombiVuruldumu[0].object.parent; // Group-u tapırıq
                    if(!hitZombie) hitZombie = zombiVuruldumu[0].object;
                    
                    let damage = (activeBlockType === 4 && player.hasSwordInHand) ? 1.5 : 0.5; // Qılınc çox vurur
                    hitZombie.health -= damage;
                    logToChat(`⚔️ Zombiyə zərbə endirildi! Canı: ${Math.max(0, hitZombie.health)}`);
                    
                    // Geri itələmə effekti
                    hitZombie.position.x -= Math.sin(yaw) * 1.2;
                    hitZombie.position.z -= Math.cos(yaw) * 1.2;

                    if(hitZombie.health <= 0) {
                        hitZombie.isAlive = false; scene.remove(hitZombie);
                        logToChat("💀 Bir zombi məhv edildi!");
                    }
                    return; // Zombiyə vurmuşuqsa blok qırma işləməsin
                }

                // Əgər zombi yoxdursa blok qırırıq və ya sandıq açırıq
                const intersects = raycaster.intersectObjects(collidableObjects);
                if (intersects.length > 0 && intersects[0].distance < 5) {
                    const obj = intersects[0].object;
                    if (obj.isChest && !obj.opened) {
                        obj.opened = true; obj.material.color.setHex(0x27ae60);
                        player.inventory.sword += 1; player.inventory.apple += 2; player.inventory.armor += 1;
                        logToChat("🧰 Sandıqdan: [1x ⚔️ Qılınc], [2x 🍎 Alma], [1x 👕 Zireh] çıxdı! 'E' ilə çantanı açın.");
                    } else if(!obj.isChest) {
                        scene.remove(obj); collidableObjects.splice(collidableObjects.indexOf(obj), 1);
                    }
                }
            } 
            // Sağ Klik: Blok Qoyma
            else if (e.button === 2) {
                const intersects = raycaster.intersectObjects(collidableObjects);
                if (intersects.length > 0 && intersects[0].distance < 5 && activeBlockType !== 4) {
                    let colors = { 1: 0x7f8c8d, 2: 0x8a5a36, 3: 0xd35400 };
                    let newB = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({ color: colors[activeBlockType] }));
                    newB.position.copy(intersects[0].object.position).add(intersects[0].face.normal);
                    scene.add(newB); collidableObjects.push(newB);
                }
            }
        });

        document.addEventListener('contextmenu', e => e.preventDefault());

        // 7. ZOMBİ SÜNİ INTELLEKTİ VƏ CANALMA MEXANİZMİ (GAME LOOP)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Qravitasiya
            player.yVelocity += player.gravity * delta; player.position.y += player.yVelocity * delta;
            if (player.position.y <= 0) { player.position.y = 0; player.yVelocity = 0; player.canJump = true; }

            // Hərəkət
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();
            const speed = player.speed * delta;
            if (moveForward) player.position.addScaledVector(forward, speed);
            if (moveBackward) player.position.addScaledVector(forward, -speed);
            if (moveLeft) player.position.addScaledVector(right, speed);
            if (moveRight) player.position.addScaledVector(right, -speed);

            playerGroup.position.copy(player.position); playerGroup.rotation.y = yaw;

            // Zombilərin Hərəkəti (Süni İntellekt)
            if(mobDamageCooldown > 0) mobDamageCooldown -= delta;

            mobs.forEach(zombie => {
                if(zombie.isAlive) {
                    // Zombi oyunçuya doğru yönəlir
                    let yön = new THREE.Vector3().subVectors(player.position, zombie.position);
                    let məsafe = yön.length();
                    yön.y = 0; yön.normalize();
                    
                    // Əgər zombi yaxındadırsa bizi təqib edir (Ağıllı Süni İntellekt)
                    if(məsafe < 15 && məsafe > 1.2) {
                        zombie.position.addScaledVector(yön, 3.2 * delta); // Zombi sürəti
                        zombie.lookAt(player.position.x, zombie.position.y, player.position.z);
                    }

                    // 🥊 ZOMBİNİN OYUNÇUNU VURMASI (Can Azalması)
                    if(məsafe <= 1.3 && mobDamageCooldown <= 0) {
                        let ziyan = player.isArmorEquipped ? 1 : 2; // Zireh varsa az zərər vurur
                        player.health -= ziyan;
                        mobDamageCooldown = 1.2; // Hər 1.2 saniyədən bir vura bilsin
                        updateHeartsUI();
                        logToChat(`💥 Bir zombi sənə vurdu! -${ziyan} can.`);
                        
                        // Oyunçu geriyə fırlasın (Hit-knockback)
                        player.position.x += yön.x * 0.8;
                        player.position.z += yön.z * 0.8;

                        // ÖLÜM YOXLANILMASI
                        if(player.health <= 0) {
                            alert("❌ Öldünüz! Oyun yenidən başlayır.");
                            player.health = 8; player.position.set(0,0,12);
                            player.isArmorEquipped = false; player.hasSwordInHand = false;
                            tpSword.visible = false; fpSwordGroup.visible = false;
                            document.getElementById('armor-status').innerText = "🛡️ Zireh: Yoxdur";
                            document.getElementById('slot-4').innerHTML = '<span class="key-num">4</span><span class="icon">🥊</span><span>Əl</span>';
                            updateHeartsUI();
                        }
                    }
                }
            });

            // Kamera Rejimləri
            if (cameraMode === 0) { // 1st Person
                camera.position.set(player.position.x, player.position.y + player.height, player.position.z);
                const target = new THREE.Vector3(Math.sin(yaw) * Math.cos(pitch), Math.sin(pitch), Math.cos(yaw) * Math.cos(pitch));
                camera.lookAt(camera.position.clone().add(target));
                headMesh.visible = false;
                if(player.hasSwordInHand && activeBlockType === 4) fpSwordGroup.visible = true;
                else fpSwordGroup.visible = false;
            } else { // 3rd Person
                headMesh.visible = true; fpSwordGroup.visible = false;
                let offset = new THREE.Vector3(-Math.sin(yaw) * 4, 2.5, -Math.cos(yaw) * 4);
                camera.position.copy(player.position).add(offset);
                camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 1, 0)));
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
