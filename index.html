<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Random World Generation - Survival</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }
        #chat { position: absolute; top: 20px; left: 20px; width: 340px; height: 140px; background: rgba(0,0,0,0.5); color: #a8ffb2; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 13px; overflow-y: hidden; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="chat"><div>[Sistem] Dünya random generasiya edildi: Evlər, Dağlar və Sakinlər yerləşdirildi!</div></div>
    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6eb5e5);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 0.7); scene.add(light);
        
        // Düz Dünya Yeri
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({ color: 0x557a2b }));
        ground.rotation.x = -Math.PI / 2; scene.add(ground);

        const collidableObjects = [];
        const mobs = [];

        // 🏗️ RANDOM DÜNYA GENERASİYASI
        function randomDunyaYarat() {
            // 1. Evlər və Şəhərcikləri random yerləşdir
            for(let i = 0; i < 10; i++) {
                let x = Math.random() * 200 - 100;
                let z = Math.random() * 200 - 100;
                evYarat(x, z);
            }

            // 2. Random Dağlar (Yüksək bloklar)
            for(let i = 0; i < 20; i++) {
                let x = Math.random() * 300 - 150;
                let z = Math.random() * 300 - 150;
                let h = Math.floor(Math.random() * 5) + 2; // Dağın hündürlüyü
                dagYarat(x, z, h);
            }
        }

        function evYarat(x, z) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshLambertMaterial({ color: 0xd2b48c });
            for(let i=0; i<4; i++) {
                let b = new THREE.Mesh(geo, mat);
                b.position.set(x + (i%2), 0.5, z + Math.floor(i/2));
                scene.add(b); collidableObjects.push(b);
            }
        }

        function dagYarat(x, z, h) {
            const geo = new THREE.BoxGeometry(2, h, 2);
            const mat = new THREE.MeshLambertMaterial({ color: 0x7f8c8d });
            let b = new THREE.Mesh(geo, mat);
            b.position.set(x, h/2, z);
            scene.add(b); collidableObjects.push(b);
        }

        // İLK İŞƏ SALMA
        randomDunyaYarat();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // MOUSE LOCK VE İDARƏ ETMEK ÜÇÜN
        document.body.addEventListener('click', () => { document.body.requestPointerLock(); });
    </script>
</body>
</html>
