<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Brauzer Minecraft Oyunu</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; color: white; pointer-events: none; text-align: center; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: white; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">Dünya yüklənir...</div>
    <div id="crosshair"></div>
    <div id="ui">
        <strong>İdarəetmə:</strong> WASD - Hərəkət | Siçan - Ətrafa baxış (Kliklə) | Sol Klik - Blok Qır | Sağ Klik - Rəngli Blok Qoy
    </div>
    <div id="canvas-container"></div>

    <script>
        // Oyun sahəsinin qurulması
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Göy üzü rəngi
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // İşıqlandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // Rəngbərəng bloklar üçün materiallar listi
        const renkler = [0xff4757, 0x2ed573, 0x1e90ff, 0xffa502, 0x9b59b6, 0xf1c40f, 0xe74c3c];
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const blocks = [];

        // Rəngbərəng Dünya Yaradılması (Xəndəklər və təpələr)
        for (let x = -10; x < 10; x++) {
            for (let z = -10; z < 10; z++) {
                // Sadə relyef (təpəçiklər) yaratmaq üçün sinusdan istifadə edirik
                let height = Math.floor(Math.sin(x * 0.3) * 2 + Math.cos(z * 0.3) * 2);
                for (let y = -3; y <= height; y++) {
                    let rastgeleRenk = renkler[Math.floor(Math.random() * renkler.length)];
                    let material = new THREE.MeshLambertMaterial({ color: rastgeleRenk });
                    let cube = new THREE.Mesh(geometry, material);
                    cube.position.set(x, y, z);
                    scene.add(cube);
                    blocks.push(cube);
                }
            }
        }

        document.getElementById('loading').style.display = 'none';
        camera.position.set(0, 5, 8);

        // Oyunçu hərəkətləri və siçan kilidlənməsi
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0;
        
        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        // Blok Qırma və Qoyma Mexanizmi
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // Ekranın mərkəzi

        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body) return;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0 && intersects[0].distance < 6) {
                const intersect = intersects[0];
                
                if (e.button === 0) { // Sol Klik: BLOK QIRMA
                    scene.remove(intersect.object);
                    blocks.splice(blocks.indexOf(intersect.object), 1);
                } 
                else if (e.button === 2) { // Sağ Klik: BLOK QOYMA
                    let rastgeleRenk = renkler[Math.floor(Math.random() * renkler.length)];
                    let mat = new THREE.MeshLambertMaterial({ color: rastgeleRenk });
                    let newCube = new THREE.Mesh(geometry, mat);
                    
                    // Yeni bloku kliklənən üzün tam yanına qoyuruq
                    newCube.position.copy(intersect.object.position).add(intersect.face.normal);
                    scene.add(newCube);
                    blocks.push(newCube);
                }
            }
        });

        // Sağ klik menyusunun açılmasını bloklayırıq
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Oyunun Dövrü (Game Loop)
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const speed = 5 * delta;

            // Kamera istiqamətini hesablama
            const target = new THREE.Vector3(
                Math.sin(yaw) * Math.cos(pitch),
                Math.sin(pitch),
                Math.cos(yaw) * Math.cos(pitch)
            );
            camera.lookAt(camera.position.clone().add(target));

            // Hərəkət xətləri
            const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();

            if (moveForward) camera.position.addScaledVector(forward, speed);
            if (moveBackward) camera.position.addScaledVector(forward, -speed);
            if (moveLeft) camera.position.addScaledVector(right, speed);
            if (moveRight) camera.position.addScaledVector(right, -speed);

            renderer.render(scene, camera);
        }
        animate();

        // Ekran ölçüsü dəyişəndə oyunu uyğunlaşdır
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
